<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isolated Cyberpunk Effects (FUI Prefixed)</title>
    
    <style>
        /* Hidden utility block for our dynamically generated SVG masks & filters */
        .fui-svg-holder {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <!-- GSAP Core CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <!-- Hidden holder for dynamically generated SVG definitions (masks and click filters) -->
    <div id="fui-dynamic-svg-holder" class="fui-svg-holder"></div>

    <!-- --- DEMO WORKSPACE --- -->

    <!-- EFFECT 1: Displacement Glitch Shake on Load ONLY -->
    <div class="fui-load-glitch">
        <h1 class="fui-title">THE CREATIVE FORCE</h1>
    </div>

    <!-- EFFECT 2: Pixel-by-Pixel Blocky Assemble on Load ONLY -->
    <div class="fui-load-build">
        <p class="fui-text">We help founders, builders, and dreamers.</p>
    </div>

    <!-- EFFECT 3: Text Scramble Decipher on Load ONLY -->
    <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px; align-items: flex-start;">
        <div class="fui-load-scramble">⚡ WEB DESIGN</div>
        <div class="fui-load-scramble">⚡ BRANDING & SYSTEM</div>
        <div class="fui-load-scramble">⚡ DEVELOPMENT</div>
    </div>

    <hr style="border: 0; border-top: 1px solid #1a1a1a; margin: 30px 0;">

    <!-- INTERACTIVE STATES: Hover-only / Click-only Scramblers -->
    <div style="display: flex; flex-direction: column; gap: 10px; align-items: flex-start;">
        <p style="color: #666; margin: 0; font-size: 0.9rem;">Interact with these text blocks:</p>
        
        <!-- Hover Scramble (will now trigger on both hover AND click) -->
        <div class="fui-hover-scramble" style="font-size: 1.5rem;">⚡ HOVER OR CLICK ME TO SCRAMBLE</div>
        
        <!-- Pure Click Scramble (triggers ONLY when clicked) -->
        <div class="fui-click-scramble" style="font-size: 1.5rem;">⚡ CLICK ME TO SCRAMBLE ONLY</div>
    </div>

    <!-- INTERACTIVE STATES: Click-only Glitch Button & Composite Button -->
    <div style="margin-top: 30px; display: flex; gap: 20px;">
        
        <!-- Button with Click Glitch ONLY -->
        <button class="fui-btn fui-click-glitch">Click to Glitch</button>

        <!-- Composite Button: Runs Scatter Build on Load + Scrambles on Hover/Click + Glitches on Click -->
        <div class="fui-load-build">
            <button class="fui-btn fui-hover-scramble fui-click-glitch">Composite Button</button>
        </div>

    </div>


  <script src="assets/dist/js/glitch.js"></script>
</body>
</html>
