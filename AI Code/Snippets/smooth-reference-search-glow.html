
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smooth Glow Search</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:#000;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.scene{position:relative;width:100%;display:grid;place-items:center}
.scene::before,.scene::after{
  content:"";position:absolute;top:50%;width:390px;height:18px;opacity:0;pointer-events:none;filter:blur(7px);
  transition:opacity 900ms cubic-bezier(.16,1,.3,1),transform 900ms cubic-bezier(.16,1,.3,1),filter 900ms cubic-bezier(.16,1,.3,1)
}
.scene::before{
  right:calc(50% + 230px);transform:translateY(-50%) translateX(48px) scaleX(.18);transform-origin:right center;
  background:linear-gradient(to left,rgba(255,255,255,.96),rgba(146,102,255,.78) 22%,rgba(75,145,255,.32) 48%,rgba(255,255,255,.12) 72%,transparent)
}
.scene::after{
  left:calc(50% + 230px);transform:translateY(-50%) translateX(-48px) scaleX(.18);transform-origin:left center;
  background:linear-gradient(to right,rgba(255,255,255,.96),rgba(74,219,255,.75) 22%,rgba(133,83,255,.30) 48%,rgba(255,255,255,.12) 72%,transparent)
}
.search-shell{
  position:relative;width:460px;height:58px;border-radius:999px;opacity:.78;transform:scale(.985);
  transition:opacity 650ms cubic-bezier(.16,1,.3,1),transform 650ms cubic-bezier(.16,1,.3,1)
}
.search-shell::before{
  content:"";position:absolute;inset:-22px -40px;border-radius:inherit;
  background:radial-gradient(circle at 18% 50%,rgba(255,255,255,.85),transparent 12%),radial-gradient(circle at 28% 50%,rgba(115,76,255,.95),transparent 28%),radial-gradient(circle at 72% 50%,rgba(55,219,255,.78),transparent 30%),linear-gradient(90deg,rgba(108,76,255,.72),rgba(76,220,255,.58));
  filter:blur(34px);opacity:0;transform:scaleX(.35) scaleY(.75);
  transition:opacity 950ms cubic-bezier(.16,1,.3,1),transform 950ms cubic-bezier(.16,1,.3,1),filter 950ms cubic-bezier(.16,1,.3,1);
  z-index:0
}
.search-shell::after{
  content:"";position:absolute;inset:-2px;border-radius:inherit;
  background:linear-gradient(90deg,rgba(255,255,255,.96) 0%,rgba(137,103,255,1) 20%,rgba(157,83,255,1) 45%,rgba(74,218,255,1) 78%,rgba(255,255,255,.96) 100%);
  opacity:0;filter:blur(.2px);
  transition:opacity 750ms cubic-bezier(.16,1,.3,1),box-shadow 900ms cubic-bezier(.16,1,.3,1),filter 750ms cubic-bezier(.16,1,.3,1);
  z-index:1;box-shadow:0 0 0 rgba(150,95,255,0),0 0 0 rgba(83,218,255,0)
}
.search{position:absolute;inset:2px;z-index:2;border-radius:999px;background:linear-gradient(#090912,#050507);display:flex;align-items:center;overflow:hidden}
.search::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 45%),radial-gradient(circle at 30% -20%,rgba(134,83,255,.24),transparent 40%),radial-gradient(circle at 76% -10%,rgba(55,220,255,.18),transparent 44%);
  opacity:.6;transition:opacity 750ms ease;pointer-events:none
}
input{position:relative;z-index:2;width:100%;height:100%;border:0;outline:0;background:transparent;color:#f5f5f7;padding:0 60px 0 28px;font-size:14px}
input::placeholder{color:rgba(220,220,230,.48)}
.icon{position:absolute;right:22px;width:19px;height:19px;color:rgba(235,235,245,.62);z-index:3}
.scene.active::before{opacity:1;filter:blur(3px);transform:translateY(-50%) translateX(0) scaleX(1)}
.scene.active::after{opacity:1;filter:blur(3px);transform:translateY(-50%) translateX(0) scaleX(1)}
.search-shell.active{opacity:1;transform:scale(1)}
.search-shell.active::before{opacity:.92;transform:scaleX(1) scaleY(1);filter:blur(22px);animation:softPulse 3s ease-in-out 950ms infinite}
.search-shell.active::after{
  opacity:1;filter:blur(0);
  box-shadow:0 0 14px rgba(150,95,255,.9),0 0 30px rgba(83,218,255,.55),0 0 48px rgba(130,88,255,.38)
}
.search-shell.active .search::before{opacity:1}
@keyframes softPulse{0%,100%{opacity:.78;filter:blur(22px)}50%{opacity:1;filter:blur(28px)}}
</style>
</head>
<body>
  <div class="scene">
    <div class="search-shell">
      <div class="search">
        <input placeholder="What do you need a tool for?" />
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0a7 7 0 0 1 14 0z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>
<script>
const input = document.querySelector("input");
const scene = document.querySelector(".scene");
const shell = document.querySelector(".search-shell");
input.addEventListener("focus", () => {
  scene.classList.add("active");
  shell.classList.add("active");
});
input.addEventListener("blur", () => {
  scene.classList.remove("active");
  shell.classList.remove("active");
});
</script>
</body>
</html>
