<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuudio.xyz Decipher Entrance</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: monospace; /* Monospace is essential for alignment during scrambles */
            padding: 60px;
        }

        /* Prevent layout shifts by preserving height/width */
        .scramble-text {
            display: inline-block;
            margin-bottom: 25px;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0; /* Hidden until loaded */
        }

        h1.scramble-text {
            font-size: 3.2rem;
            font-weight: 900;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid #a3e635; /* Lime Accent */
            color: #a3e635;
            text-decoration: none;
        }
    </style>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <!-- Target Elements containing their final resolved text -->
    <h1 class="scramble-text">THE CREATIVE FORCE</h1>
    <br>
    <div class="scramble-text">WEB DESIGN</div>
    <br>
    <div class="scramble-text">BRANDING & SYSTEM</div>
    <br>
    <div class="scramble-text">DEVELOPMENT</div>
    <br><br>
    <div class="scramble-text" data-is-button="true">
        <a href="#" class="btn">BOOK A CAL?</a>
    </div>

    <script>
        // The characters used during the glitchy scramble sequence
        const GLITCH_CHARS = "!?@#$%&*()_+[]{}|;:<>?/\\0123456789";

        // Scramble animation controller function
        function scrambleElement(el, duration = 1.0) {
            // If it's a button, we target the inner anchor text to preserve the button wrapper
            const targetNode = el.querySelector('a') || el;
            const originalText = targetNode.textContent;
            
            // Set element visible
            gsap.set(el, { opacity: 1 });

            const obj = { progress: 0 };

            gsap.to(obj, {
                progress: 1,
                duration: duration,
                ease: "power1.out",
                onUpdate: () => {
                    // Calculate how many characters should be resolved based on current progress
                    const solvedCount = Math.floor(obj.progress * originalText.length);
                    
                    let currentOutput = "";

                    for (let i = 0; i < originalText.length; i++) {
                        if (originalText[i] === " ") {
                            currentOutput += " "; // Maintain spacing
                        } else if (i < solvedCount) {
                            currentOutput += originalText[i]; // Lock in final letter
                        } else {
                            // Generate a random high-tech matrix symbol
                            const randomChar = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
                            currentOutput += randomChar;
                        }
                    }

                    targetNode.textContent = currentOutput;
                },
                onComplete: () => {
                    // Ensure the final layout text matches perfectly without trailing errors
                    targetNode.textContent = originalText;
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.scramble-text');

            // Stagger the activation of each text block to mimic the cascade on Stuudio.xyz
            elements.forEach((el, index) => {
                gsap.delayedCall(index * 0.25, () => {
                    scrambleElement(el, 1.2);
                });
            });
        });
    </script>
</body>
</html>
